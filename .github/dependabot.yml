version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
    cooldown:
      default-days: 7

  - package-ecosystem: 'pre-commit'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
    cooldown:
      default-days: 7

  - package-ecosystem: 'bundler'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
    cooldown:
      default-days: 7
